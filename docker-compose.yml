services:
  pdf_processor_service:
    build:
      context: .
      dockerfile: ./pdf_processor_service/Dockerfile
    container_name: pdf_processor_service
    ports:
      - "8000:8000"
    env_file:
      - ./pdf_processor_service/.env
      
  pdf_extraction:
    build:
      context: .
      dockerfile: ./pdf_extraction_service/dockerfile
    container_name: pdf_extraction_service
    ports:
      - "8001:8000"  # Host port 8001 mapped to container's 8000
    env_file:
      - ./pdf_extraction_service/.env
    depends_on:
      - minio

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Admin UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbucket:
    image: minio/mc
    container_name: createbucket
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for MinIO to be ready...';
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 2;
        done;
        echo 'MinIO is healthy, continuing...';
        mc mb -p local/omnifiles;
        mc policy set none local/omnifiles
        exit 0;
      "
  vllm:
    container_name: gemini
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ipc: host
    volumes:
      - ./models/gemini/models--describeai--gemini/snapshots/aa5c52e95888664ccbb83d868de3b7b26ae123c3:/mnt/model/
    #  - /home/ubuntu/.cache/hugging-face:/root/.cache/huggingface
    ports:
      - "80:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - HF_HUB_OFFLINE=1
    command: [
      "--model", "/mnt/model/",
      "--served-model-name","gemini",
      "--max-model-len", "4096",
    #  "--tensor-parallel-size", "4",
    #  --tensor-parallel-size", "1",
      "--gpu-memory-utilization", "0.5",
    ]

    # ./models/gemini/models--describeai--gemini/snapshots/aa5c52e95888664ccbb83d868de3b7b26ae123c3
volumes:
  minio-data: